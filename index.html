<!DOCTYPE html>
<html lang="tr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNVVJ5986D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RNVVJ5986D');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FATBOK TV - CANLI YAYIN</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="header">FATBOK<span>TV</span></div>
        
        <div class="sidebar-tabs">
            <button class="tab-btn active" onclick="switchTab('channels')" id="btn-channels">CANLI KANALLAR</button>
            <button class="tab-btn" onclick="switchTab('matches')" id="id-matches">MAÇ LİSTESİ</button>
        </div>

        <div id="tab-wrapper">
            <div id="tab-channels" class="tab-content active">
                <div class="search-container">
                    <input type="text" id="search" placeholder="Kanal veya maç ara..." autocomplete="off">
                </div>
                <div id="channels">
                    </div>
            </div>

            <div id="tab-matches" class="tab-content">
                <div id="matches-list">
                    </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <a href="mailto:panzerrbeyy@gmail.com">
                <i class="fas fa-envelope"></i>
                <span>panzerrbeyy@gmail.com</span>
            </a>
        </div>
    </nav>

    <button class="toggle-btn" id="sidebar-toggle" onclick="toggleSidebar()">▶</button>

    <main class="main-content">
        <header class="layout-header">
            <div class="status">
                <span class="live-indicator">● CANLI</span>
                <span id="current-channel">İzlemek istediğiniz içeriği seçin</span>
            </div>

            <div class="layout-buttons">
                <button onclick="setLayout(1)">1'li</button>
                <button onclick="setLayout(2)">2'li</button>
                <button onclick="setLayout(4)">4'lü</button>
                <button onclick="toggleCinemaMode()" id="cinema-btn" class="special-btn">Sinema Modu</button>
            </div>
        </header>

        <div id="players">
            <div class="welcome-screen">
                <div class="welcome-content">
                    <img src="https://cdn-icons-png.flaticon.com/512/716/716429.png" alt="TV Icon" class="tv-icon">
                    <h2>İzlemek istediğiniz içeriği seçin</h2>
                </div>
            </div>
        </div>

        <div class="ad-banner">
            <a href="#">
                <img src="https://i.ibb.co/vzYp668/betandyou-reklam.png" alt="Reklam" onerror="this.style.display='none'">
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="script.js"></script>
</body>
</html>
