<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATBOK TV - CREXOWW</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>

<body>

<!-- DESKTOP SIDEBAR (Aynı kaldı) -->
<nav class="sidebar" id="sidebar">
    <div class="header">FATBOK<span>TV</span></div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Kanal ara...">
    </div>
    <div id="channels"></div>
</nav>

<button class="toggle-btn" id="sidebar-toggle">☰</button>

<main class="main-content">

<header class="layout-header">
    <div class="status">
        <span class="live-indicator">● CANLI</span>
        <span id="current-channel">Yayın Merkezi</span>
    </div>

    <div class="layout-buttons">
        <button onclick="setLayout(1)">1</button>
        <button onclick="setLayout(2)">2</button>
        <button onclick="setLayout(4)">4</button>
        <button onclick="toggleCinemaMode()" id="cinema-btn">Sinema</button>
    </div>
</header>

<div id="players"></div>

</main>

<!-- 🔥 MOBİL ALT PANEL -->
<div class="bottom-panel" id="bottomPanel">

    <div class="panel-handle" onclick="togglePanel()">⬆</div>

    <!-- TAB -->
    <div class="panel-tabs">
        <button class="tab active" onclick="switchTab('channelsTab')">Kanallar</button>
        <button class="tab" onclick="switchTab('matchesTab')">Maçlar</button>
    </div>

    <!-- KANALLAR -->
    <div id="channelsTab" class="tab-content active">
        <input type="text" id="search-mobile" placeholder="Kanal ara...">
        <div id="channels-mobile"></div>
    </div>

    <!-- MAÇLAR -->
    <div id="matchesTab" class="tab-content">
        <div class="match" onclick="playStream('URL_BURAYA', 'MAÇ YAYINI')">
            ⚽ Galatasaray vs Fenerbahçe<br><small>20:00 - Bein Sports 1</small>
        </div>

        <div class="match" onclick="playStream('URL_BURAYA', 'MAÇ YAYINI')">
            ⚽ Real Madrid vs Barcelona<br><small>22:00 - S Sport</small>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="script.js"></script>

</body>
</html>
