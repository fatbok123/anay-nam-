<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>FATBOK TV PRO</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; text-align: center; }
        .container { width: 90%; max-width: 900px; margin: 30px auto; }
        #player-frame { 
            width: 100%; 
            height: 500px; 
            border: 2px solid #0f0; 
            box-shadow: 0 0 20px #0f0; 
            background: #000;
        }
        .input-area { margin-top: 20px; }
        input { padding: 12px; width: 250px; background: #111; color: #0f0; border: 1px solid #0f0; outline: none; }
        button { padding: 12px 25px; background: #0f0; color: #000; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>
    <h1 style="text-shadow: 0 0 10px #0f0;">FATBOK <span style="color:#fff">TV PRO</span></h1>
    
    <div class="container">
        <iframe id="main-frame" src="" scrolling="no" frameborder="0" allowfullscreen="true" id="player-frame"></iframe>
        
        <div class="input-area">
            <input type="text" id="idInput" placeholder="Yakaladığın ID'yi gir...">
            <button onclick="loadStream()">YAYINI PATLAT</button>
        </div>
    </div>

    <script>
        function loadStream() {
            const id = document.getElementById('idInput').value;
            const frame = document.getElementById('main-frame');
            if(id) {
                // Karşı sitenin embed ana dizinini kullanıyoruz
                frame.src = "https://s1.embedsport.live/tv/?id=" + id;
                console.log("Yüklenen: " + frame.src);
            }
        }
    </script>
</body>
</html>
