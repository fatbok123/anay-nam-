<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>FATBOK TV PRO</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .box { border: 2px solid #0f0; padding: 40px; border-radius: 15px; box-shadow: 0 0 20px #0f0; text-align: center; background: #050505; }
        h1 { margin-bottom: 20px; letter-spacing: 5px; text-shadow: 0 0 10px #0f0; }
        input { padding: 15px; width: 250px; background: #111; color: #0f0; border: 1px solid #0f0; font-size: 16px; outline: none; margin-bottom: 20px; text-align: center; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 15px 30px; background: #0f0; color: #000; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; border-radius: 5px; }
        button:hover { background: #fff; transform: scale(1.05); }
        .warning { margin-top: 20px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="box">
        <h1>FATBOK TV <span style="color:white">PRO</span></h1>
        
        <input type="text" id="idInput" placeholder="ID Gir (Örn: 400117203)" value="400117203">
        
        <div class="btn-group">
            <button onclick="loadIframe()">PLAYER'A YÜKLE</button>
            <button style="background: #fff;" onclick="openPopup()">GÜVENLİ MODDA AÇ</button>
        </div>

        <div id="playerArea" style="margin-top:20px; display:none;">
            <iframe id="mainFrame" width="800" height="450" frameborder="0" allowfullscreen referrerpolicy="no-referrer"></iframe>
        </div>

        <p class="warning">Not: Eğer Player açılmazsa "Güvenli Mod" butonunu deneyin.</p>
    </div>

    <script>
        function loadIframe() {
            const id = document.getElementById('idInput').value;
            const area = document.getElementById('playerArea');
            const frame = document.getElementById('mainFrame');
            area.style.display = "block";
            // Referrer'ı kırmak için doğrudan embed linkini veriyoruz
            frame.src = "https://s1.embedsport.live/tv/?id=" + id;
        }

        function openPopup() {
            const id = document.getElementById('idInput').value;
            const url = "https://s1.embedsport.live/tv/?id=" + id;
            // Yeni pencerede referrer bilgisini gönderemez, bu yüzden engel takılmaz
            window.open(url, 'FATBOK TV', 'width=900,height=600');
        }
    </script>
</body>
</html>
