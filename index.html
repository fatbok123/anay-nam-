<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FATBOK TV - CREXOWW</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="header">FATBOK<span>TV</span></div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Kanal ara..." autocomplete="off">
        </div>
        <div id="channels">
            </div>
        
        <div style="margin-top: auto; padding: 15px 10px; background: #111; border-top: 1px solid rgba(255,255,255,0.1); position: sticky; bottom: 0;">
            <a href="mailto:fatboktvreklam@proton.me" 
               style="display: flex; align-items: center; justify-content: center; text-decoration: none; color: #00ff00; font-size: 12px; font-weight: bold; background: rgba(0, 255, 0, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(0, 255, 0, 0.3); transition: 0.3s; width: 100%; box-sizing: border-box;">
                <i class="fas fa-envelope-open-text" style="margin-right: 8px;"></i>
                <span>Reklam & Sponsorluk</span>
            </a>
        </div>
    </nav>

    <button class="toggle-btn" id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menü Değiştir">◀</button>

    <main class="main-content">
        <header class="layout-header">
            <div class="status">
                <span class="live-indicator">● CANLI</span>
                <span id="current-channel">Yayın Merkezi</span>
            </div>
            <div class="layout-buttons">
                <button onclick="setLayout(1)" title="Tekli Ekran">1'li</button>
                <button onclick="setLayout(2)" title="İkili Ekran">2'li</button>
                <button onclick="setLayout(4)" title="Dörtlü Ekran">4'lü</button>
                <button onclick="toggleCinemaMode()" id="cinema-btn" class="special-btn">Sinema Modu</button>
            </div>
        </header>

        <div style="background: rgba(0, 255, 0, 0.05); border: 1px solid rgba(0, 255, 0, 0.2); padding: 6px 15px; margin: 0 15px 15px 15px; border-radius: 10px;">
            <a href="mailto:fatboktvreklam@proton.me" 
               style="text-decoration: none; color: #00ff00; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 12px; font-weight: 700;">
                <i class="fas fa-handshake"></i>
                <span>REKLAM VE SPONSORLUK:</span>
                <span style="color: #fff; background: rgba(0, 255, 0, 0.15); padding: 2px 8px; border-radius: 4px; font-family: monospace;">fatboktvreklam@proton.me</span>
            </a>
        </div>

        <div id="players">
            <div class="welcome-msg">
                <div class="msg-content">
                    <i class="fas fa-tv" style="font-size: 40px; margin-bottom: 15px; display: block;"></i>
                    <span>Lütfen izlemek istediğiniz kanalı soldaki menüden seçiniz.</span>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="script.js"></script>
</body>
</html>
